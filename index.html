<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRITI 3.0 | 全知图鉴版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f1f5f9;
        }

        .handwritten {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .start-card {
            @apply w-full text-left p-6 border-2 border-slate-200 rounded-2xl transition-all duration-200
                   bg-white shadow-sm flex justify-center items-center gap-4 hover:border-indigo-500 hover:bg-indigo-50 active:scale-[0.98];
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-dot {
            @apply h-1.5 rounded-full bg-slate-200 transition-all duration-300;
        }

        .progress-dot.active {
            @apply bg-indigo-600;
        }

        .zen-mode {
            @apply bg-zinc-900 text-zinc-100;
        }

        .zen-mode .res-card {
            @apply bg-zinc-800 border-zinc-700 text-zinc-300;
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex items-center justify-center transition-colors duration-700" id="body-wrap">

function createInitialScores() {
    return {
        R: { T: 0, A: 0 },
        M: { D: 0, P: 0 },
        S: { N: 0, M: 0 },
        C: { I: 0, E: 0, C: 0 },
        E: { S: 0, W: 0, B: 0 },
        Z: { Z: 0 }
    };
}

let currentS = '';
let qIdx = 0;
let history = [];
let scores = createInitialScores();

const optionThemes = [
    { wrapper: "bg-blue-50/60 border-blue-200 hover:bg-blue-100 hover:border-blue-500 text-blue-900", check: "border-blue-300 bg-white group-hover:bg-blue-200 group-hover:border-blue-500" },
    { wrapper: "bg-emerald-50/60 border-emerald-200 hover:bg-emerald-100 hover:border-emerald-500 text-emerald-900", check: "border-emerald-300 bg-white group-hover:bg-emerald-200 group-hover:border-emerald-500" },
    { wrapper: "bg-amber-50/60 border-amber-200 hover:bg-amber-100 hover:border-amber-500 text-amber-900", check: "border-amber-300 bg-white group-hover:bg-amber-200 group-hover:border-amber-500" }
];

function initQuiz(stage) {
    currentS = stage;
    qIdx = 0;
    history = [];
    scores = createInitialScores();

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');

    renderQ();
}

function renderQ() {
    const qList = questions[currentS];
    const q = qList[qIdx];

    document.getElementById('q-counter').innerText = `${String(qIdx + 1).padStart(2, '0')} / ${String(qList.length).padStart(2, '0')}`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('back-btn').style.visibility = qIdx === 0 ? 'hidden' : 'visible';

    const bar = document.getElementById('dots-bar');
    bar.innerHTML = '';
    for (let i = 0; i < qList.length; i++) {
        const d = document.createElement('div');
        d.className = `progress-dot flex-1 ${i <= qIdx ? 'active' : ''}`;
        bar.appendChild(d);
    }

    const area = document.getElementById('options-area');
    area.innerHTML = '';

    q.opts.forEach((o, index) => {
        const theme = optionThemes[index % optionThemes.length];
        const btn = document.createElement('button');

        btn.className = `group w-full text-left p-5 border-2 rounded-2xl transition-all duration-200 shadow-sm flex items-start gap-4 active:scale-[0.98] fade-in ${theme.wrapper}`;

        btn.innerHTML = `
            <div class="w-6 h-6 rounded-full border-2 flex-shrink-0 mt-0.5 transition-colors ${theme.check}"></div>
            <div class="font-bold text-base leading-snug">${o.t}</div>
        `;

        btn.onclick = () => {
            history.push({ dim: o.d, val: o.v });
            scores[o.d][o.v]++;

            if (++qIdx < qList.length) {
                renderQ();
            } else {
                showResult();
            }
        };

        area.appendChild(btn);
    });
}

function prevQ() {
    if (qIdx > 0) {
        qIdx--;
        const last = history.pop();
        scores[last.dim][last.val]--;
        renderQ();
    }
}

function calculateResultCode() {
    if (scores.Z.Z >= 2) return "ZERO";

    if (scores.E.S >= 2) return "BEHAV_S";
    if (scores.E.W >= 2) return "BEHAV_W";
    if (scores.E.B >= 2) return "BEHAV_B";
    if (scores.C.C >= 1) return "EXTRA_C";

    if (scores.S.N - scores.S.M >= 3) return "EXTRA_N";
    if (scores.S.M - scores.S.N >= 3) return "EXTRA_M";
    if (scores.C.I - scores.C.E >= 3) return "EXTRA_I";
    if (scores.C.E - scores.C.I >= 3) return "EXTRA_E";

    const r = scores.R.T >= scores.R.A ? 'T' : 'A';
    const m = scores.M.D >= scores.M.P ? 'D' : 'P';
    const s = scores.S.N >= scores.S.M ? 'N' : 'M';
    const c = scores.C.I >= scores.C.E ? 'I' : 'E';

    return r + m + s + c;
}

function showResult() {
    const code = calculateResultCode();
    const res = results[code] || results["TDNI"];

    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');

    document.getElementById('res-code').innerText = code === "ZERO" ? "ZERO" : code;
    document.getElementById('res-name').innerText = res.name;
    document.getElementById('res-quote').innerText = `“${res.quote}”`;

    document.getElementById('res-desc').innerHTML = res.desc.replace(/\n/g, '<br><br>');

    document.getElementById('res-detail').innerHTML = `
        <div class="mt-2">
            <div class="font-bold text-slate-800 mb-2">详细讲解</div>
            <div>${(res.detail || "这种人格说明你在科研节奏、导师关系和成果偏好上有比较鲜明的个人风格。保持自己的优势，同时注意平衡毕业、生活和求职节奏。").replace(/\n/g, '<br><br>')}</div>
        </div>
    `;

    document.getElementById('res-note').innerHTML = `
        <span class="font-bold">温馨提示：</span>
        本测试结果仅供娱乐，希望每位研究生都能顺利毕业、论文顺利、答辩顺利，最终找到理想的好工作。科研很难，但你已经很棒了。
    `;

    const scoreHtml = `
        <span class="px-3 py-1 bg-slate-100 rounded-md border border-slate-200">理论[T] ${scores.R.T}</span>
        <span class="px-3 py-1 bg-slate-100 rounded-md border border-slate-200">应用[A] ${scores.R.A}</span>
        <span class="px-3 py-1 bg-slate-100 rounded-md border border-slate-200">内在[I] ${scores.C.I}</span>
        <span class="px-3 py-1 bg-slate-100 rounded-md border border-slate-200">外在[E] ${scores.C.E}</span>
    `;

    if (code !== "ZERO") {
        document.getElementById('score-display').innerHTML = scoreHtml;
    } else {
        document.getElementById('score-display').innerHTML = `<span class="px-3 py-1 bg-zinc-800 text-zinc-400 rounded-md border border-zinc-700">???</span>`;
    }

    if (code === "ZERO") {
        document.getElementById('body-wrap').classList.add('bg-zinc-950');
        document.getElementById('app').classList.replace('bg-white', 'bg-zinc-900');
        document.getElementById('header-bar').className = "bg-zinc-950 p-8 text-zinc-500 text-center relative border-b border-zinc-800 transition-colors duration-700";
        document.getElementById('res-code').classList.replace('text-indigo-600', 'text-zinc-500');
        document.getElementById('res-name').classList.replace('text-slate-800', 'text-zinc-300');
        document.getElementById('res-name').classList.replace('decoration-indigo-200', 'decoration-zinc-700');
        document.getElementById('res-card-bg').classList.replace('bg-slate-50', 'bg-zinc-800');
        document.getElementById('res-card-bg').classList.replace('border-slate-100', 'border-zinc-700');
        document.getElementById('res-quote').classList.replace('text-indigo-600', 'text-zinc-400');
        document.getElementById('res-desc').classList.replace('text-slate-700', 'text-zinc-300');
        document.getElementById('res-detail').classList.replace('text-slate-600', 'text-zinc-400');
        document.querySelector('#res-detail .font-bold')?.classList.replace('text-slate-800', 'text-zinc-200');
        document.getElementById('res-note').className = "mb-6 mx-auto max-w-lg text-left bg-zinc-800 border border-zinc-700 text-zinc-300 rounded-2xl px-5 py-4 text-sm leading-relaxed";
        document.getElementById('credit-footer').className = "mt-6 text-center text-xs md:text-sm text-zinc-500 leading-relaxed border-t border-zinc-700 pt-4";
        document.getElementById('restart-btn').classList.replace('bg-slate-900', 'bg-zinc-950');
        document.getElementById('restart-btn').classList.replace('text-white', 'text-zinc-500');
        document.getElementById('restart-btn').classList.add('border', 'border-zinc-800');
    }
}
</script>
</body>
</html>
